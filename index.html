
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACER - Associação Cultural Esportiva Raízes</title>
    <meta name="description" content="Associação Cultural Esportiva Raízes (ACER) - Transformando vidas através do esporte e cultura em Olímpia-SP desde 1999." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              acer: {
                blue: '#175298',
                dark: '#3D3D3D',
                light: '#FFFFFF'
              }
            },
            fontFamily: {
              sans: ['Open Sans', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        scroll-behavior: smooth;
      }
      /* ── Banner Emenda Animations ── */
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
      }
      @keyframes float-slow-reverse {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(15px) scale(0.95); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes pulse-badge {
        0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
        50% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
      }
      @keyframes slide-arrow {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(6px); }
      }
      .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }
      .animate-float-slow-reverse { animation: float-slow-reverse 7s ease-in-out infinite; }
      .animate-float-delay { animation: float-slow 8s ease-in-out 1s infinite; }
      .animate-pulse-badge { animation: pulse-badge 2s ease-in-out infinite; }
      .animate-slide-arrow { animation: slide-arrow 1.5s ease-in-out infinite; }
      .animate-shimmer {
        background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.08) 50%, transparent 70%);
        background-size: 200% 100%;
        animation: shimmer 3s linear infinite;
      }
    </style>
  <script type="importmap">

  }
}
</script>

</html>
